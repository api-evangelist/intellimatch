aid: intellimatch
name: IntelliMatch
description: >-
  IntelliMatch is a transaction and account reconciliation platform originally
  developed by SunGard and now offered by FIS for financial institutions and
  corporates to automate matching, exception management, and reconciliation
  across high volumes of cash, securities, and intercompany activity. There is
  no public developer API or documentation.
